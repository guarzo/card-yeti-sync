on:
  push:
    branches: [main]
  pull_request:

name: CI

jobs:
  CI:
    name: CI
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20.19
          cache: 'npm'

      - name: Install dependencies
        run: npm install

      - name: Run TypeScript type checking
        run: npx tsc --noEmit

      - name: Run ESLint
        run: npm run lint

      - name: Validate Prisma
        run: npx prisma generate && npx prisma validate
        env:
          DATABASE_URL: "postgresql://ci:ci@localhost:5432/ci"

      - name: Check Prisma migration drift
        run: npx prisma migrate diff --from-schema-datamodel prisma/schema.prisma --to-migrations prisma/migrations --exit-code
        env:
          DATABASE_URL: "postgresql://ci:ci@localhost:5432/ci"

      - name: Run tests
        run: npm test

      - name: Build application
        run: npm run build
